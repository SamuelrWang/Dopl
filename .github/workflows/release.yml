name: release

on:
  push:
    tags:
      - "client-v*.*.*"
      - "cli-v*.*.*"
      - "mcp-server-v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build all workspaces
        run: |
          npm run build -w @dopl/client
          npm run build -w @dopl/mcp-server
          npm run build -w @dopl/cli

      - name: Test all workspaces
        run: |
          npm test -w @dopl/client
          npm test -w @dopl/cli

      - name: Resolve target package from tag
        id: resolve
        run: |
          TAG="${GITHUB_REF_NAME}"
          case "$TAG" in
            client-v*)     echo "workspace=@dopl/client"     >> "$GITHUB_OUTPUT" ; echo "package_dir=packages/dopl-client" >> "$GITHUB_OUTPUT" ;;
            cli-v*)        echo "workspace=@dopl/cli"        >> "$GITHUB_OUTPUT" ; echo "package_dir=packages/cli"         >> "$GITHUB_OUTPUT" ;;
            mcp-server-v*) echo "workspace=@dopl/mcp-server" >> "$GITHUB_OUTPUT" ; echo "package_dir=packages/mcp-server"  >> "$GITHUB_OUTPUT" ;;
            *) echo "Unknown tag prefix: $TAG"; exit 1 ;;
          esac

      - name: Verify tag version matches package.json version
        run: |
          set -eu
          EXPECTED="${GITHUB_REF_NAME#*-v}"
          ACTUAL=$(node -p "require('./${{ steps.resolve.outputs.package_dir }}/package.json').version")
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "❌ Tag version ($EXPECTED) doesn't match package.json version ($ACTUAL)"
            echo "   Bump ${{ steps.resolve.outputs.package_dir }}/package.json before tagging."
            exit 1
          fi
          echo "✓ Tag $GITHUB_REF_NAME matches package.json version $ACTUAL"

      - name: Publish to npm
        run: npm publish -w ${{ steps.resolve.outputs.workspace }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Extract changelog body for this version
        id: changelog
        shell: bash
        run: |
          set -eu
          VERSION="${GITHUB_REF_NAME#*-v}"
          CHANGELOG="${{ steps.resolve.outputs.package_dir }}/CHANGELOG.md"
          if [ ! -f "$CHANGELOG" ]; then
            echo "❌ $CHANGELOG does not exist. Add one before tagging."
            exit 1
          fi
          BODY=$(awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' "$CHANGELOG")
          # Trim leading/trailing blank lines for the emptiness check.
          TRIMMED=$(printf '%s' "$BODY" | sed -e '/./,$!d' -e ':a' -e '/^\n*$/{$d;N;ba' -e '}')
          if [ -z "$TRIMMED" ]; then
            echo "❌ No '## [$VERSION]' section found in $CHANGELOG."
            echo "   Add the section before tagging — release notes would be empty."
            exit 1
          fi
          {
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          generate_release_notes: false
