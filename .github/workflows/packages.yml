name: packages

on:
  pull_request:
    paths:
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/packages.yml"
  push:
    branches: [main, master]
    paths:
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/packages.yml"

jobs:
  build-test:
    name: node ${{ matrix.node }} / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build @dopl/client
        run: npm run build -w @dopl/client

      - name: Build @dopl/mcp-server
        run: npm run build -w @dopl/mcp-server

      - name: Build @dopl/cli
        run: npm run build -w @dopl/cli

      - name: Test @dopl/client
        run: npm test -w @dopl/client

      - name: Test @dopl/cli
        run: npm test -w @dopl/cli

  size-check:
    name: file size cap (500 lines)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enforce 500-line hard cap in packages/
        shell: bash
        run: |
          set -eu
          # Files explicitly exempted in ENGINEERING.md §2 (Known files >500 lines).
          # When a new file lands here, add it to that table too.
          ALLOW=$(printf '%s\n' \
            'packages/mcp-server/src/server.ts' \
            'packages/dopl-client/src/client.ts')

          BAD=$(find packages -type f \( -name '*.ts' -o -name '*.tsx' \) \
            ! -path '*/dist/*' ! -path '*/node_modules/*' \
            -exec awk 'END { if (NR > 500) print FILENAME, NR }' {} \; \
            | grep -vF "$ALLOW" || true)
          if [ -n "$BAD" ]; then
            echo "Files over 500 lines (ENGINEERING.md §2):"
            echo "$BAD"
            exit 1
          fi
          echo "All files within the 500-line cap."
